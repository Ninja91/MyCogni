services:
  mycogni-core-smoke:
    image: mycogni/core:0.0.0
    user: "65532:65532"
    read_only: true
    network_mode: none
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp/mycogni:rw,noexec,nosuid,nodev,size=16m,uid=65532,gid=65532,mode=0700
    volumes: []
