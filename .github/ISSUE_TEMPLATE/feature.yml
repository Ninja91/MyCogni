name: Feature proposal
description: Propose a product or architecture change with a narrow user outcome.
title: "proposal: "
labels: [proposal]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the job and evidence without personal data.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Smallest useful outcome
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy, security, and abuse considerations
    validations:
      required: true
  - type: textarea
    id: measure
    attributes:
      label: How would we know it worked?
    validations:
      required: true
