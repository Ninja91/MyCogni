[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "mycogni-connector-sdk"
version = "0.0.0"
description = "Typed, behavior-free connector protocol boundary for MyCogni"
readme = "README.md"
requires-python = ">=3.12,<3.14"
license = "Apache-2.0"
authors = [{ name = "MyCogni contributors" }]
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/connector_protocol"]

[tool.pytest.ini_options]
addopts = ["--strict-config", "--strict-markers", "-ra"]
testpaths = ["tests"]
xfail_strict = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["B", "C4", "E4", "E7", "E9", "F", "I", "SIM", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["connector_protocol"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
show_error_codes = true
pretty = true
packages = ["connector_protocol"]
